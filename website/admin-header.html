<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadWatch PH — Admin Header</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --header-bg: rgba(255, 255, 255, 0.72);
      --text: #1f2937;
      --muted: #64748b;
      --input-bg: rgba(255, 255, 255, 0.82);
      --border: rgba(148, 163, 184, 0.35);
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      --icon-hover: rgba(15, 23, 42, 0.06);
      --accent: #3b82f6;
      --badge: #ef4444;
    }

    body.dark {
      --bg: #0f172a;
      --header-bg: rgba(17, 24, 39, 0.7);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --input-bg: rgba(30, 41, 59, 0.85);
      --border: rgba(148, 163, 184, 0.28);
      --shadow: 0 14px 34px rgba(2, 6, 23, 0.45);
      --icon-hover: rgba(148, 163, 184, 0.15);
      --accent: #60a5fa;
      --badge: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      transition: background 0.28s ease, color 0.28s ease;
      padding: 18px;
    }

    .header {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border-radius: 20px;
      background: var(--header-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      transition: background 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
    }

    .left {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
      flex: 0 0 auto;
    }

    .brand {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .center {
      display: flex;
      justify-content: center;
      min-width: 0;
    }

    .search-wrap {
      position: relative;
      width: min(100%, 580px);
    }

    .search-wrap svg {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--input-bg);
      color: var(--text);
      padding: 12px 14px 12px 42px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.24);
    }

    .right {
      display: inline-flex;
      align-items: center;
      min-width: 0;
    }

    .quick-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.22s ease, transform 0.22s ease, border-color 0.22s ease;
      position: relative;
    }

    .icon-btn:hover {
      background: var(--icon-hover);
      transform: translateY(-1px);
    }

    .icon-btn:focus-visible,
    .profile:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 17px;
      height: 17px;
      padding: 0 4px;
      border-radius: 999px;
      background: var(--badge);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: grid;
      place-items: center;
      line-height: 1;
      border: 2px solid var(--header-bg);
    }

    .profile {
      margin-left: 14px;
      padding: 4px 8px 4px 4px;
      border-radius: 14px;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      transition: background 0.22s ease, border-color 0.22s ease;
      background: transparent;
    }

    .profile:hover {
      background: var(--icon-hover);
      border-color: var(--border);
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(145deg, #64748b 0%, #334155 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .username {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .center {
        display: none;
      }

      .header {
        grid-template-columns: auto auto;
        justify-content: space-between;
      }

      .username {
        display: none;
      }

      .profile {
        margin-left: 10px;
        padding-right: 4px;
      }
    }
  </style>
</head>
<body>
  <header class="header" aria-label="Admin dashboard header">
    <div class="left">
      <div class="logo" aria-hidden="true"></div>
      <div class="brand">RoadWatch PH</div>
    </div>

    <div class="center">
      <label class="search-wrap" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="20" y1="20" x2="16.65" y2="16.65"></line>
        </svg>
        <input class="search-input" type="text" placeholder="Search reports, location..." />
      </label>
    </div>

    <div class="right">
      <div class="quick-actions" aria-label="Quick actions">
        <button class="icon-btn" type="button" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
            <path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
            <path d="M13.73 21a2 2 0 01-3.46 0"></path>
          </svg>
          <span class="badge">3</span>
        </button>

        <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme" title="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true"></svg>
        </button>
      </div>

      <button class="profile" type="button" aria-label="Profile">
        <span class="avatar" aria-hidden="true"></span>
        <span class="username">roadwatchph</span>
      </button>
    </div>
  </header>

  <script>
    const body = document.body;
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");
    const storageKey = "rwph-theme";

    const iconPaths = {
      light: '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2.3"></path><path d="M12 19.7V22"></path><path d="M4.93 4.93l1.62 1.62"></path><path d="M17.45 17.45l1.62 1.62"></path><path d="M2 12h2.3"></path><path d="M19.7 12H22"></path><path d="M4.93 19.07l1.62-1.62"></path><path d="M17.45 6.55l1.62-1.62"></path>',
      dark: '<path d="M21 12.79A9 9 0 1111.21 3c0 .28.02.57.05.85A7 7 0 0021 12.79z"></path>'
    };

    function setTheme(theme) {
      body.classList.toggle("dark", theme === "dark");
      themeIcon.innerHTML = theme === "dark" ? iconPaths.light : iconPaths.dark;
      localStorage.setItem(storageKey, theme);
    }

    function getInitialTheme() {
      const saved = localStorage.getItem(storageKey);
      if (saved === "light" || saved === "dark") return saved;
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    setTheme(getInitialTheme());

    themeToggle.addEventListener("click", () => {
      const nextTheme = body.classList.contains("dark") ? "light" : "dark";
      setTheme(nextTheme);
    });
  </script>
</body>
</html>
